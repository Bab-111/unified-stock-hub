name: Unified Stock Hub

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode: full (all tabs) / screener / partial'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - screener
          - partial

  repository_dispatch:
    types:
      - run-full
      - run-screener
      - run-partial

  schedule:
    - cron: "0 13 * * 1-5"
    - cron: "30 13 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "0 19 * * 1-5"
    - cron: "0 20 * * 1-5"
    - cron: "0 22 * * 1-5"
    - cron: "0 0 * * 2-6"

permissions:
  contents: write

jobs:
  run-hub:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.run_mode }}"
            echo "RUN_MODE=${MODE:-full}" >> $GITHUB_ENV
          elif [ "$EVENT" = "repository_dispatch" ]; then
            case "${{ github.event.action }}" in
              run-full)    echo "RUN_MODE=full"     >> $GITHUB_ENV ;;
              run-partial) echo "RUN_MODE=partial"  >> $GITHUB_ENV ;;
              *)           echo "RUN_MODE=screener" >> $GITHUB_ENV ;;
            esac
          else
            HOUR=$(date -u +"%H")
            MIN=$(date -u +"%M")
            if   [ "$HOUR" = "13" ] && [ "$MIN" = "00" ]; then echo "RUN_MODE=full"     >> $GITHUB_ENV
            elif [ "$HOUR" = "20" ] && [ "$MIN" = "00" ]; then echo "RUN_MODE=full"     >> $GITHUB_ENV
            elif [ "$HOUR" = "22" ] || [ "$HOUR" = "00" ];then echo "RUN_MODE=partial"  >> $GITHUB_ENV
            else                                                 echo "RUN_MODE=screener" >> $GITHUB_ENV
            fi
          fi

      - name: Run Stock Hub
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RUN_MODE: ${{ env.RUN_MODE }}
        run: python scripts/main.py

      - name: Commit cache back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/
          git diff --staged --quiet || git commit -m "cache: $(date -u '+%Y-%m-%d %H:%M') mode=${{ env.RUN_MODE }}"
          git push
        continue-on-error: true

      - name: Verify output
        run: |
          test -f output/index.html
          echo "HTML size: $(du -sh output/index.html | cut -f1)"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true
