name: Unified Stock Hub

# ── Schedule strategy (UTC, ET = UTC-4 summer) ────────────────────────────
#
# Phase              UTC      ET         RUN_MODE    Modules
# ─────────────────────────────────────────────────────────────────
# Pre-market         13:00    9:00 AM    full        Screener + Monitor + News
# Open bell          13:30    9:30 AM    screener    Screener only
# Morning            14:30    10:30 AM   screener    Screener only
# Midday             17:00    1:00 PM    screener    Screener only
# Power hour         19:00    3:00 PM    screener    Screener only
# Market close       20:00    4:00 PM    full        Screener + Monitor + News
# After-hours        22:00    6:00 PM    partial     Screener + News
# Late after-hours   00:00    8:00 PM    partial     Screener + News
#
# Total: 8 runs/day × 20 trading days = 160 runs/month
# Full runs (LLM ~280 tok): 40/month. Screener-only (LLM ~150 tok): 100/month.
# GitHub Actions free tier: 2000 min/month. ~4 min/run = 640 min = 32%.

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode: full (all tabs) / screener / partial'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - screener
          - partial
  schedule:
    # Pre-market — full run
    - cron: "0 13 * * 1-5"
    # Open bell — screener only
    - cron: "30 13 * * 1-5"
    # Morning — screener only
    - cron: "30 14 * * 1-5"
    # Midday — screener only
    - cron: "0 17 * * 1-5"
    # Power hour — screener only
    - cron: "0 19 * * 1-5"
    # Market close — full run
    - cron: "0 20 * * 1-5"
    # After-hours — screener + news
    - cron: "0 22 * * 1-5"
    # Late after-hours — screener + news
    - cron: "0 0 * * 2-6"

permissions:
  contents: write

jobs:
  run-hub:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          # workflow_dispatch can override with input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.run_mode }}"
            echo "RUN_MODE=${MODE:-full}" >> $GITHUB_ENV
          else
            HOUR=$(date -u +"%H")
            MIN=$(date -u +"%M")
            # 13:00 and 20:00 = full; 22:00 and 00:00 = partial; others = screener
            if [ "$HOUR" = "13" ] && [ "$MIN" = "00" ]; then
              echo "RUN_MODE=full" >> $GITHUB_ENV
            elif [ "$HOUR" = "20" ] && [ "$MIN" = "00" ]; then
              echo "RUN_MODE=full" >> $GITHUB_ENV
            elif [ "$HOUR" = "22" ] || [ "$HOUR" = "00" ]; then
              echo "RUN_MODE=partial" >> $GITHUB_ENV
            else
              echo "RUN_MODE=screener" >> $GITHUB_ENV
            fi
          fi

      - name: Run Stock Hub
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RUN_MODE: ${{ env.RUN_MODE }}
        run: python scripts/main.py

      - name: Verify output
        run: |
          ls -lh output/
          test -f output/index.html
          echo "HTML size: $(du -sh output/index.html | cut -f1)"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true
